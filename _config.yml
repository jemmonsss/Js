# ---- Core site ----
title: J Emmons
description: Personal portfolio — links and free/public web tools.
author: J Emmons
url: "https://jemmonsss.github.io"
baseurl: "/Js"                  # "" for a user/org site, "/repo" for project site
lang: en-US
timezone: UTC

# ---- Build ----
markdown: kramdown
encoding: utf-8
highlighter: rouge              # syntax highlighting
excerpt_separator: "\n\n"
permalink: pretty

# ---- Collections: Projects gallery ----
collections:
  projects:
    output: true                # generate a page per project
    permalink: /projects/:slug/

# ---- Plugins (GitHub-Pages safe only) ----
plugins:
  - jekyll-seo-tag              # automated metadata / OG tags
  - jekyll-feed                 # RSS (metadata extraction)
  - jekyll-sitemap              # SEO
  - jekyll-redirect-from        # future-proofing

# Items excluded from sitemap.xml (404 / drafts)
sitemap:
  exclude:
    - /404.html
    - /drafts/
# NOTE: rouge is built into Jekyll; no plugin entry needed.
# Avoid non-allowlisted gems (e.g. jekyll-archives) or Pages build fails.

# ---- SEO / social (consumed by jekyll-seo-tag) ----
social:
  name: J Emmons
  links:
    - https://github.com/jemmonsss
    - https://www.youtube.com/@jemmonsss

# jekyll-seo-tag site-wide defaults
twitter:
  username: jemmonsss
  card: summary_large_image
logo: /images/logo.png
og_image: /images/logo.png

# Defaults applied automatically (less front-matter repetition)
defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: default
      image: /images/projects/knolagebase.png

# ---- Theme / assets ----
sass:
  style: compressed             # minify CSS in production
include:
  - _projects
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - templates                   # authoring templates, not published
