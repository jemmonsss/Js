<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  {% include person-jsonld.html %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="{{ '/images/favicon.ico' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/images/favicon.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/images/apple-touch-icon.png' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="container">
    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" target="_self">Links</a>
        <a href="{{ '/projects/' | relative_url }}" target="_self">Projects</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      &copy; {{ site.time | date: '%Y' }} {{ site.author }}. Built with Jekyll &amp; GitHub Pages.
      &middot; <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      &middot; <a href="{{ '/sitemap.xml' | relative_url }}">Sitemap</a>
    </footer>
  </div>
</body>
</html>
